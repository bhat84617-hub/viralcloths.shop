<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - ViralClothes.Shop</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div id="app">
  <div id="loginPage" class="login-page">
    <div class="login-box">
      <div class="login-logo"><i class="fas fa-crown"></i> VIRAL<span>ADMIN</span></div>
      <p class="login-subtitle">Admin Panel</p>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="admin@viralclothes.shop" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-primary">Sign In <i class="fas fa-arrow-right"></i></button>
        <p id="loginError" class="error-msg"></p>
      </form>
    </div>
  </div>

  <div id="dashboardPage" style="display:none">
    <aside class="sidebar">
      <div class="sidebar-logo"><i class="fas fa-crown"></i> VC<span>Admin</span></div>
      <nav class="sidebar-nav">
        <a class="active" data-page="dashboard" onclick="showPage('dashboard',this)"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <a data-page="orders" onclick="showPage('orders',this)"><i class="fas fa-truck"></i> Orders</a>
        <a data-page="products" onclick="showPage('products',this)"><i class="fas fa-box"></i> Products</a>
        <a data-page="categories" onclick="showPage('categories',this)"><i class="fas fa-tags"></i> Categories</a>
        <a data-page="brands" onclick="showPage('brands',this)"><i class="fas fa-building"></i> Brands</a>
        <a data-page="customers" onclick="showPage('customers',this)"><i class="fas fa-users"></i> Customers</a>
        <a data-page="coupons" onclick="showPage('coupons',this)"><i class="fas fa-percent"></i> Coupons</a>
        <a data-page="banners" onclick="showPage('banners',this)"><i class="fas fa-images"></i> Banners</a>
        <a data-page="reviews" onclick="showPage('reviews',this)"><i class="fas fa-star"></i> Reviews</a>
        <a data-page="shipping" onclick="showPage('shipping',this)"><i class="fas fa-ship"></i> Shipping</a>
        <a data-page="giftcards" onclick="showPage('giftcards',this)"><i class="fas fa-gift"></i> Gift Cards</a>
        <a data-page="payments" onclick="showPage('payments',this)"><i class="fas fa-credit-card"></i> Payments</a>
        <a data-page="settings" onclick="showPage('settings',this)"><i class="fas fa-cog"></i> Settings</a>
      </nav>
      <div class="sidebar-footer">
        <a href="../index.html" target="_blank"><i class="fas fa-external-link-alt"></i> View Site</a>
        <a onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </aside>
    <main class="main-content">
      <header class="topbar">
        <h2 id="pageTitle">Dashboard</h2>
        <div class="topbar-right">
          <span id="adminName">Admin</span>
        </div>
      </header>
      <div class="content" id="pageContent"></div>
    </main>
  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
